services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-securescope}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-securescope}"]
      interval: 5s
      timeout: 5s
      retries: 10

  securescope-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: development
      # Overrides backend/.env's 127.0.0.1 default — inside Docker the API
      # must reach Postgres via the "postgres" service DNS name, not localhost.
      SECURESCOPE_DATABASE_DSN: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-securescope}
    depends_on:
      postgres:
        condition: service_healthy
      local-amd-model-mock:
        condition: service_started

  securescope-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # API Base URL used by browser runtime
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
      NEXT_PUBLIC_USE_MOCK_API: "false"
      # API Base URL used by server-side proxy
      API_INTERNAL_BASE_URL: "http://securescope-api:8000"
      # Seed org UUIDs for local multi-tenant dev — matches app.seed
      NEXT_PUBLIC_SEED_ORG_IDS: "00000000-0000-0000-0000-000000000001,00000000-0000-0000-0000-000000000002,00000000-0000-0000-0000-000000000003"
    depends_on:
      - securescope-api

  local-amd-model-mock:
    image: python:3.12-slim
    command: >
      sh -c '
      pip install --no-cache-dir fastapi uvicorn pydantic &&
      uvicorn app:app --host 0.0.0.0 --port 8000
      '
    volumes:
      - ./docker/local-amd-model-mock/app.py:/app.py
    ports:
      - "8001:8000"
    expose:
      - "8000"

  local-amd-model-rocm:
    image: rocm/vllm:latest
    profiles: ["amd-rocm"]
    ports:
      - "8002:8000"
    command: >
      --model <local-model-name>
      --trust-remote-code

volumes:
  postgres_data:
