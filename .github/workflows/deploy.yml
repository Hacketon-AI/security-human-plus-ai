name: Deploy VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup & Sanitize SSH Key
        env:
          RAW_SECRET_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          python3 -c "import os, re; raw=os.environ.get('RAW_SECRET_KEY','').strip(); fallback=''; key = raw if len(raw) > 20 else fallback; clean = re.sub(r'-----BEGIN[^-]+-----', '', key); clean = re.sub(r'-----END[^-]+-----', '', clean); clean = re.sub(r'\s+', '', clean); folded = [clean[i:i+70] for i in range(0, len(clean), 70)]; pem = '-----BEGIN OPENSSH PRIVATE KEY-----\n' + '\n'.join(folded) + '\n-----END OPENSSH PRIVATE KEY-----\n'; open(os.path.expanduser('~/.ssh/id_ed25519'), 'w').write(pem)"
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519

      - name: SSH and Run Deploy Script
        run: |
          ssh -o StrictHostKeyChecking=no root@srv1691160.hstgr.cloud "
            set -e
            mkdir -p /opt/security-human-plus-ai
            cd /opt/security-human-plus-ai
            if [ ! -d '.git' ]; then
              git clone https://github.com/Hacketon-AI/security-human-plus-ai.git .
            else
              git pull origin main || true
            fi
            chmod +x scripts/deploy-vps.sh
            ./scripts/deploy-vps.sh
          "
