name: Deploy VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          else
            echo "" | base64 -d > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519

      - name: SSH and Run Deploy Script
        run: |
          ssh -o StrictHostKeyChecking=no root@srv1691160.hstgr.cloud "
            set -e
            mkdir -p /opt/security-human-plus-ai
            cd /opt/security-human-plus-ai
            if [ ! -d '.git' ]; then
              git clone https://github.com/Hacketon-AI/security-human-plus-ai.git .
            else
              git pull origin main || true
            fi
            chmod +x scripts/deploy-vps.sh
            ./scripts/deploy-vps.sh
          "
