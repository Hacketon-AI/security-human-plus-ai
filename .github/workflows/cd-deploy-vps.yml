name: CD VPS Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          if [ -n "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          else
            cat << 'EOF' > ~/.ssh/id_ed25519
-----BEGIN OPENSSH PRIVATE KEY-----
b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW
QyNTUxOQAAACDc1FtQmdv11jXEhkOGKoglChXmlmBlEDkzTmxi6Oq1TAAAAJj9dlOz/XZT
swAAAAtzc2gtZWQyNTUxOQAAACDc1FtQmdv11jXEhkOGKoglChXmlmBlEDkzTmxi6Oq1TA
AAAEDg12PPL8JmqPPzFx34FHvKIBuRlxCz7FZ7J4UjMiLhVtzUW1CZ2/XWNcSGQ4YqiCUK
FeaWYGUQOTNObGLo6rVMAAAAFGdpdGh1Yi1jZEBzcnYxNjkxMTYwAQ==
-----END OPENSSH PRIVATE KEY-----
EOF
          fi
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy to VPS
        run: |
          chmod +x scripts/vps-remote-exec.sh
          bash scripts/vps-remote-exec.sh "${{ secrets.VPS_USERNAME || 'root' }}" "${{ secrets.VPS_HOST || 'srv1691160.hstgr.cloud' }}" "${{ secrets.VPS_PORT || '22' }}" "${{ secrets.VPS_DEPLOY_PATH || '/opt/security-human-plus-ai' }}"
